name: secure_mesh_app
description: Secure decentralized mesh messenger with E2E encryption and offline sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Rust Bridge
  flutter_rust_bridge: ^1.82.6
  ffigen: ^11.0.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  
  # Utilities
  uuid: ^4.3.3
  intl: ^0.18.1
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2
  battery_plus: ^5.0.2
  permission_handler: ^11.3.0
  
  # Crypto (Dart fallback)
  encrypt: ^5.0.3
  ed25519_edwards: ^0.3.1
  
  # Base64
  base64_dart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_rust_bridge_codegen: ^1.82.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: SecureMeshIcons
      fonts:
        - asset: assets/fonts/SecureMeshIcons.ttf
